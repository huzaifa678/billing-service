name: Dev to test PR

on:
  push:
    branches:
      - dev

permissions:
  contents: read
  pull-requests: write

jobs:
  create-pr:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Create PR from dev to test
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --base test \
            --head dev \
            --title "Auto PR: dev → test" \
            --body "Automated PR from dev to test." \
          || echo "PR already exists"
          