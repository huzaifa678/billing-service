name: billing-service CD

on:
  pull_request:
    branches: [main]
    paths: [billing-service/**]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.GITOPS_APP_ID }}
          private-key: ${{ secrets.GITOPS_APP_PRIVATE_KEY }}
          owner: huzaifa678
          repositories: SAAS-Continious-Delivery

      - uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Get ECR URL
        id: ecr
        run: |
          ECR_URL=$(aws ecr describe-repositories --repository-names billing-service \
            --query 'repositories[0].repositoryUri' --output text)
          echo "url=$ECR_URL" >> $GITHUB_OUTPUT

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Retag sha → prod
        run: |
          MANIFEST=$(aws ecr batch-get-image --repository-name billing-service \
            --image-ids imageTag=sha-${{ github.sha }} \
            --query 'images[0].imageManifest' --output text)
          aws ecr put-image --repository-name billing-service \
            --image-tag prod --image-manifest "$MANIFEST"

      - name: Update ArgoCD values-prod.yaml
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          git clone https://x-access-token:${GH_TOKEN}@github.com/huzaifa678/SAAS-Continious-Delivery.git /tmp/cd
          cd /tmp/cd

          wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64
          chmod +x /usr/local/bin/yq

          yq -i '.image.repository = "${{ steps.ecr.outputs.url }}"' charts/billing-service/values-prod.yaml
          yq -i '.image.tag = "prod"' charts/billing-service/values-prod.yaml

      - name: Commit and Push
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          cd /tmp/cd
          git config user.email "${{ steps.app-token.outputs.installation-id }}+saas-gitops-bot[bot]@users.noreply.github.com"
          git config user.name "SAAS-gitops-bot[bot]"
          git add charts/billing-service/values-prod.yaml
          git commit -m "cd(billing-service): promote sha-${{ github.sha }} to prod"
          git push
