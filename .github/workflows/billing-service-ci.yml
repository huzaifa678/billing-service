name: billing-service CI

on:
  workflow_dispatch:
  push:
    branches: [dev]
    paths: [billing-service/**]
  pull_request:
    branches: [test, main]
    paths: [billing-service/**]

env:
  IMAGE: ${{ secrets.DOCKER_HUB_USERNAME }}/billing-service

jobs:
  ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: billing-service

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          cache: gradle

      - name: Run tests
        run: ./gradlew test --no-daemon
        env:
          STRIPE_API_KEY: ${{ secrets.STRIPE_API_KEY }}

      - name: Configure AWS creds
        if: github.event_name == 'push'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Get ECR repo
        if: github.event_name == 'push'
        id: ecr
        run: |
          ECR_URL=$(aws ecr describe-repositories \
            --repository-names $IMAGE_NAME \
            --query 'repositories[0].repositoryUri' \
            --output text)
          echo "url=$ECR_URL" >> $GITHUB_OUTPUT

      - name: Login to ECR
        if: github.event_name == 'push'
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push image
        if: github.event_name == 'push'
        uses: docker/build-push-action@v6
        with:
          context: subscription-service
          push: true
          tags: ${{ steps.ecr.outputs.url }}:${{ github.sha }}
