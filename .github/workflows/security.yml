name: security

on:
  pull_request:
  push:
    branches: [dev]

permissions:
  contents: read

env:
  CONFTEST_VERSION: 0.56.0
  TRIVY_VERSION: v0.58.1

jobs:
  guardrails:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install conftest
        run: |
          curl -sSfL "https://github.com/open-policy-agent/conftest/releases/download/v${CONFTEST_VERSION}/conftest_${CONFTEST_VERSION}_Linux_x86_64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin conftest

      - name: Install Trivy
        run: |
          curl -sSfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b "$HOME/.local/bin" "${TRIVY_VERSION}"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Dockerfile Policy as Code (conftest / OPA)
        run: |
          conftest verify -p policy/docker
          mapfile -t DFILES < <(find . -type f \( -name 'Dockerfile' -o -name 'Dockerfile.*' \) \
            -not -path '*/node_modules/*' -not -path '*/.git/*' -not -path '*/vendor/*' | sort)
          echo "Dockerfiles: ${DFILES[*]}"
          for df in "${DFILES[@]}"; do
            echo "== ${df} =="
            conftest test "${df}" --parser dockerfile -p policy/docker
          done

      - name: Checkov (dockerfile + secrets, baseline)
        run: |
          pip install checkov
          checkov -d . --framework dockerfile,secrets --config-file .checkov.yaml

      - name: Trivy config (Dockerfile/IaC misconfiguration, report)
        run: trivy config --exit-code 0 .

      - name: Trivy fs (dependency vulnerabilities, gate on CRITICAL/HIGH)
        run: |
          trivy fs --scanners vuln --severity CRITICAL,HIGH --ignore-unfixed \
            --exit-code 1 --skip-dirs node_modules .
