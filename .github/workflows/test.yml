# tests will be triggered in this pipeline mainly E2E test
name: billing-service Test

on:
  pull_request:
    branches: [test]
    paths: [billing-service/**]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    defaults:
      run:
        working-directory: billing-service

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          cache: gradle

      - name: Run tests
        run: ./gradlew test --no-daemon
        env:
          STRIPE_API_KEY: ${{ secrets.STRIPE_API_KEY }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Get ECR URL
        id: ecr
        run: |
          ECR_URL=$(aws ecr describe-repositories --repository-names billing-service \
            --query 'repositories[0].repositoryUri' --output text)
          echo "url=$ECR_URL" >> $GITHUB_OUTPUT

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Retag sha to test
        run: |
          MANIFEST=$(aws ecr batch-get-image --repository-name billing-service \
            --image-ids imageTag=sha-${{ github.sha }} \
            --query 'images[0].imageManifest' --output text)
          aws ecr put-image --repository-name billing-service \
            --image-tag test --image-manifest "$MANIFEST"

      - name: Update ArgoCD values-test.yaml
        env:
          ARGOCD_REPO_TOKEN: ${{ secrets.ARGOCD_REPO_TOKEN }}
        run: |
          git clone https://x-access-token:${ARGOCD_REPO_TOKEN}@github.com/huzaifa678/SAAS-Continious-Delivery.git /tmp/cd
          cd /tmp/cd

          wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64
          chmod +x /usr/local/bin/yq

          yq -i '.image.billingService = "${{ steps.ecr.outputs.url }}:test"' saas-chart/values-test.yaml

          git config user.email "ci@github.com"
          git config user.name "GitHub Actions"
          git add saas-chart/values-test.yaml
          git commit -m "test(billing-service): promote sha-${{ github.sha }} to test"
          git push
