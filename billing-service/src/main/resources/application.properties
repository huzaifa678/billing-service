spring.application.name=billing-service
spring.datasource.url=jdbc:postgresql://localhost:5434/billing_db
spring.datasource.username=billing_user
spring.datasource.password=billing_password
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.pool-name=BillingHikariPool
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000

stripe.api.key: ${STRIPE_API_KEY}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

server.port=8082

spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=billing-service
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=io.confluent.kafka.serializers.KafkaAvroDeserializer
spring.kafka.consumer.properties.schema.registry.url=http://localhost:9094

spring.config.import=optional:classpath:application-cred.properties

spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=2s
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=2
spring.data.redis.lettuce.pool.max-wait=2s

grpc.subscription.host=localhost
grpc.subscription.port=50051

spring.kafka.consumer.properties.specific.avro.reader=true

management.logging.export.otlp.enabled=true
management.tracing.sampling.probability=1.0
management.otlp.metrics.export.url=http://localhost:43180/v1/metrics
management.opentelemetry.logging.export.otlp.endpoint=http://localhost:43180/v1/logs
management.opentelemetry.tracing.export.otlp.endpoint=http://localhost:43180/v1/traces
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.tracing.export.enabled=true

resilience4j.circuitbreaker.instances.subscriptionGrpc.register-health-indicator=true
resilience4j.circuitbreaker.instances.subscriptionGrpc.sliding-window-size=10
resilience4j.circuitbreaker.instances.subscriptionGrpc.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.subscriptionGrpc.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.subscriptionGrpc.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.subscriptionGrpc.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.subscriptionGrpc.automatic-transition-from-open-to-half-open-enabled=true
resilience4j.retry.instances.subscriptionGrpc.enable-exponential-backoff=true
resilience4j.retry.instances.subscriptionGrpc.exponential-backoff-multiplier=2
resilience4j.retry.instances.subscriptionGrpc.wait-duration=300ms
resilience4j.retry.instances.subscriptionGrpc.retry-exceptions=io.grpc.StatusRuntimeException
resilience4j.retry.instances.subscriptionGrpc.ignore-exceptions=java.lang.IllegalArgumentException
resilience4j.retry.instances.stripePayment.max-attempts=2
resilience4j.retry.instances.stripePayment.wait-duration=1s

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html